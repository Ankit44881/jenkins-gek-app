apiVersion: apps/v1
kind: Deployment 
metadata: 
  name: chai-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chai-politics
  template:
    metadata:
      labels:
        app: chai-politics
    spec: 
      containers:
      - name: nginx-container
        image: ankit44881/chai-app:latest
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: chai-service
spec:
  type: LoadBalancer
  selector:
    app: chai-politics
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
